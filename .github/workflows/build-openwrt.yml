# ============================================================================
# OpenWrt 官方源码自动化编译系统 v4.0.0
# 源码: https://github.com/openwrt/openwrt
# 适配: TP-LINK XDR6088 / REDMI AX6000
# 插件源: kenzok8/small-package
# ============================================================================

name: Build OpenWrt (Official Source)

on:
  workflow_dispatch:
    inputs:
      device:
        description: '🎯 选择编译机型'
        required: true
        default: 'ax6000'
        type: choice
        options: [xdr6088, ax6000, custom]
      config_version:
        description: '📦 配置版本'
        required: true
        default: 'full'
        type: choice
        options: [full, mini, test]
      enable_translate:
        description: '🔤 启用插件汉化'
        required: false
        default: 'true'
        type: boolean
      enable_kernel_sync:
        description: '🔧 同步指定内核版本'
        required: false
        default: 'false'
        type: boolean
        type: string
      skip_feeds_modify:
        description: '⏭️ 跳过 feeds 配置修改'
        required: false
        default: 'false'
        type: boolean

env:
  # 📦 源码配置
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: master
  
  # 🎯 设备配置
  DEVICE: ${{ github.event.inputs.device || 'ax6000' }}
  CONFIG_VERSION: ${{ github.event.inputs.config_version || 'full' }}
  
  # 🔧 功能开关
  ENABLE_TRANSLATE: ${{ github.event.inputs.enable_translate || 'true' }}
  ENABLE_KERNEL_SYNC: ${{ github.event.inputs.enable_kernel_sync || 'false' }}
  SKIP_FEEDS_MODIFY: ${{ github.event.inputs.skip_feeds_modify || 'false' }}
  
  # 📶 WiFi 配置
  WIFI_PASSWORD: "1234567890"
  
  # 🏷️ 输出配置
  FIRMWARE_RELEASE: true
  UPLOAD_BIN_DIR: false
  CACHE_TOOLCHAIN: true
  TZ: Asia/Shanghai
  
  # 📁 路径配置
  WORK_DIR: ${{ github.workspace }}/openwrt
  OUTPUT_DIR: ${{ github.workspace }}/output
  DIY_SCRIPT: ${{ github.workspace }}/diy/diy-openwrt.sh

jobs:
  Build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    steps:
    # 🔍 步骤 0: 环境检测
    - name: 🔍 系统环境检测
      run: |
        echo "🖥️ GitHub Actions 服务器信息"
        echo "• CPU: $(cat /proc/cpuinfo | grep 'model name' | head -1 | cut -d: -f2 | xargs)"
        echo "• 核心: $(nproc) | 内存: $(free -h | grep Mem | awk '{print $2}')"
        echo "• 磁盘: $(df -h / | tail -1 | awk '{print $2" (可用 "$4")"}')"
        echo "📋 编译参数: 机型=${{ env.DEVICE }} 配置=${{ env.CONFIG_VERSION }}"
        df -h

    # 🛠️ 步骤 1: 初始化编译环境
    - name: 🛠️ 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 安装官方OpenWrt编译依赖
        sudo -E apt -yqq update
        sudo -E apt -yqq full-upgrade
        sudo -E apt -yqq install \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib \
          g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 \
          libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
          libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool \
          llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf python3 \
          python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
          swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        
        # 额外工具
        sudo -E apt -yqq install dos2unix python3-netifaces
        
        # 配置Git
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'noreply@github.com'
        
        # 设置时区
        sudo -E timedatectl set-timezone "Asia/Shanghai"

    # 💾 步骤 2: 最大化磁盘空间
    - name: 💾 合并磁盘空间
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 2048
        temp-reserve-mb: 200
        root-reserve-mb: 2048

    # 🔍 步骤 3: 检出仓库代码
    - name: 🔍 检出仓库代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 📥 步骤 4: 克隆 OpenWrt 官方源码
    - name: 📥 克隆 OpenWrt 官方源码
      run: |
        echo "📦 克隆源码: ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }}"
        git clone --single-branch ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} ${{ env.WORK_DIR }}
        cd ${{ env.WORK_DIR }}
        echo "COMPILE_DATE=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
        echo "FIRMWARE_TAG=$(date +"%Y%m%d")" >> $GITHUB_ENV
        echo "OPENWRT_PATH=${{ env.WORK_DIR }}" >> $GITHUB_ENV
        
        # 提取设备目标
        CONFIG_PATH="${{ github.workspace }}/config/${{ env.DEVICE }}-${{ env.CONFIG_VERSION }}.config"
        if [ -f "$CONFIG_PATH" ]; then
          echo "DEVICE_TARGET=$(grep '^CONFIG_TARGET_BOARD' "$CONFIG_PATH" | cut -d'"' -f2)" >> $GITHUB_ENV
          echo "DEVICE_SUBTARGET=$(grep '^CONFIG_TARGET_SUBTARGET' "$CONFIG_PATH" | cut -d'"' -f2)" >> $GITHUB_ENV
        fi

    # 💾 步骤 5: 缓存工具链
    - name: 💾 缓存工具链
      if: env.CACHE_TOOLCHAIN == 'true'
      uses: HiGarfield/cachewrtbuild@main
      with:
        ccache: true
        mixkey: openwrt-${{ env.REPO_BRANCH }}-${{ env.DEVICE }}-${{ env.CONFIG_VERSION }}
        prefix: ${{ env.WORK_DIR }}

    # ⚙️ 步骤 6: 应用配置文件
    - name: ⚙️ 应用配置文件
      run: |
        cd ${{ env.WORK_DIR }}
        
        # 定位配置文件
        CONFIG_SRC="${{ github.workspace }}/config/${{ env.DEVICE }}-${{ env.CONFIG_VERSION }}.config"
        echo "📋 应用配置文件: $CONFIG_SRC"
        
        if [ ! -f "$CONFIG_SRC" ]; then
          echo "❌ 错误：找不到配置文件 $CONFIG_SRC"
          exit 1
        fi
        
        cp -f "$CONFIG_SRC" .config
        
        # 解析依赖
        echo "🔄 解析配置依赖..."
        make defconfig 2>&1 | tail -5
        
        # 显示配置摘要
        echo ""
        echo "🔍 配置摘要:"
        TARGET_BOARD=$(grep '^CONFIG_TARGET_BOARD' .config | cut -d'"' -f2)
        TARGET_SUB=$(grep '^CONFIG_TARGET_SUBTARGET' .config | cut -d'"' -f2)
        TARGET_PROFILE=$(grep '^CONFIG_TARGET_PROFILE' .config | cut -d'"' -f2)
        
        echo "   📡 平台: $TARGET_BOARD / $TARGET_SUB"
        echo "   📦 设备: $TARGET_PROFILE"
        echo "   📊 插件: $(grep -c '^CONFIG_PACKAGE_.
